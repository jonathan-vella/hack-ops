# HackOps CI Workflow
# Validates the HackOps Next.js web application on PRs and pushes.
# Jobs: lint, type-check, test (with coverage), bicep-validate, build.

name: HackOps CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "infra/bicep/hackops/**"
      - "package.json"
      - "turbo.json"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "infra/bicep/hackops/**"
      - "package.json"
      - "turbo.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run --workspace @hackops/web lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npm run type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

  bicep-validate:
    name: Bicep Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep

      - name: Bicep build
        run: bicep build infra/bicep/hackops/main.bicep

      - name: Bicep lint
        run: bicep lint infra/bicep/hackops/main.bicep

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, bicep-validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: hackops-web-build
          path: apps/web/.next/standalone/
          retention-days: 7
