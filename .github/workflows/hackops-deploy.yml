# HackOps Deploy Workflow
# Builds container image, pushes to ACR, deploys via Bicep + slot swap.
# - dev: auto-deploys on push to main (staging slot swap)
# - prod: manual dispatch with approval gate
#
# Prerequisites:
#   1. Azure AD app registration with federated credential for this repo
#   2. GitHub environments "dev" and "prod" configured with OIDC secrets
#   3. "prod" environment has required-reviewers protection rule
#   4. OIDC identity has AcrPush on ACR (see docs/first-deploy-runbook.md)
#
# OIDC setup (per environment):
#   AZURE_CLIENT_ID       — App registration client ID
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID — Target subscription ID
#   AZURE_RESOURCE_GROUP  — Target resource group (e.g. rg-hackops-us-dev)
#   AZURE_WEBAPP_NAME     — App Service name (e.g. app-hackops-dev)
#
# Environment vars (per environment):
#   AZURE_ACR_NAME         — ACR resource name (e.g. crhackopsdevABC123)
#   AZURE_ACR_LOGIN_SERVER — ACR login server (e.g. crhackopsdevabc123.azurecr.io)
#   AZURE_OWNER            — Resource owner tag value
#   AZURE_TECHNICAL_CONTACT — Technical contact email tag value
#   ADMIN_GITHUB_IDS       — Comma-separated GitHub user IDs for admin auto-assign
#
# Environment secrets (per environment):
#   GITHUB_OAUTH_CLIENT_ID     — GitHub OAuth App client ID
#   GITHUB_OAUTH_CLIENT_SECRET — GitHub OAuth App client secret

name: HackOps Deploy

on:
  workflow_run:
    workflows: ["HackOps CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: hackops-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  # ── Build container image, scan, push to ACR ─────────────────────────
  build:
    name: Build & Push Container
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Determine image tag from SHA (P11)
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: hackops:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: hackops:${{ steps.meta.outputs.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - name: Tag and push image (SHA only — no latest, P12)
        run: |
          docker tag "hackops:${{ steps.meta.outputs.sha }}" \
            "${{ vars.AZURE_ACR_LOGIN_SERVER }}/hackops:${{ steps.meta.outputs.sha }}"
          docker push "${{ vars.AZURE_ACR_LOGIN_SERVER }}/hackops:${{ steps.meta.outputs.sha }}"

  # ── Deploy to dev ────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'workflow_run') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
      url: https://${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-dev' }}.azurewebsites.net
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy IaC (Bicep) — no --no-wait (P10)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP || 'rg-hackops-us-dev' }}" \
            --template-file infra/bicep/hackops/main.bicep \
            --parameters environment=dev projectName=hackops \
              imageTag=${{ needs.build.outputs.image-tag }} \
              owner="${{ vars.AZURE_OWNER }}" \
              technicalContact="${{ vars.AZURE_TECHNICAL_CONTACT }}" \
              githubOAuthClientId="${{ secrets.GITHUB_OAUTH_CLIENT_ID }}" \
              githubOAuthClientSecret="${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}" \
              adminGithubIds="${{ vars.ADMIN_GITHUB_IDS }}" \
            --mode Incremental

      - name: Wait for staging slot container to start
        run: |
          echo "Waiting for staging slot container to become ready..."
          STAGING_URL="https://${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-dev' }}-staging.azurewebsites.net/api/health"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging slot healthy (attempt $i)"
              break
            fi
            echo "Attempt $i: status $STATUS — retrying in 15s..."
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging slot failed health check after 20 attempts"
            exit 1
          fi

      - name: Swap staging to production slot
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP || 'rg-hackops-us-dev' }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-dev' }}" \
            --slot staging \
            --target-slot production

      - name: Verify deployment health (auto-rollback on failure)
        run: |
          HEALTH_URL="https://${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-dev' }}.azurewebsites.net/api/health"
          echo "Checking health at $HEALTH_URL ..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed — executing rollback swap"
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP || 'rg-hackops-us-dev' }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-dev' }}" \
            --slot staging \
            --target-slot production
          echo "Rollback swap completed — previous version restored"
          exit 1

  # ── Deploy to prod ───────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod'
    environment:
      name: prod
      url: https://${{ vars.AZURE_WEBAPP_NAME || 'app-hackops-prod' }}.azurewebsites.net
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy IaC (Bicep) — no --no-wait (P10)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/bicep/hackops/main.bicep \
            --parameters environment=prod projectName=hackops \
              imageTag=${{ needs.build.outputs.image-tag }} \
              owner="${{ vars.AZURE_OWNER }}" \
              technicalContact="${{ vars.AZURE_TECHNICAL_CONTACT }}" \
              githubOAuthClientId="${{ secrets.GITHUB_OAUTH_CLIENT_ID }}" \
              githubOAuthClientSecret="${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}" \
              adminGithubIds="${{ vars.ADMIN_GITHUB_IDS }}" \
            --mode Incremental

      - name: Wait for staging slot container to start
        run: |
          echo "Waiting for staging slot container to become ready..."
          STAGING_URL="https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/api/health"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging slot healthy (attempt $i)"
              break
            fi
            echo "Attempt $i: status $STATUS — retrying in 15s..."
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging slot failed health check after 20 attempts"
            exit 1
          fi

      - name: Swap staging to production slot
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --slot staging \
            --target-slot production

      - name: Verify deployment health (auto-rollback on failure)
        run: |
          HEALTH_URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          echo "Checking health at $HEALTH_URL ..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed — executing rollback swap"
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --slot staging \
            --target-slot production
          echo "Rollback swap completed — previous version restored"
          exit 1
